use_directory_urls: true
site_name: RedHub
site_url: https://yunniperka.github.io/RedHub/
site_author: yunni

theme:
  name: material

  font:
    text: Inter
    code: Fira Code

  palette:
    - scheme: slate
      primary: custom
      accent: custom

  features:
    - navigation.sections
    - toc.integrate
    - toc.follow
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - navigation.top
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/custom.css

nav:
  - Home: index.md
  - Windows:
      - Dupa: dupa.md
  - Linux:
      - Dupa: dupa.md
  - Active Directory:
      - Fundamentals: AD/AD_Fundamentals.md
      - Initial Reconnaissance: AD/Initial_Recon.md
      - Unauthenticated Attacks: AD/Unauth_Attacks.md
      - Authenticated Attacks: AD/Auth_Attacks.md
      - Credential Access: AD/Credential_Access.md
      - Kerberos Attacks: AD/Kerberos_Attacks.md
      - NTLM Relay & Coercion: AD/NTLM_Relay_and_Coercion.md
      - ACL Abuse: AD/ACL_Abuse.md
      - Lateral Movement: AD/Lateral_Movement.md
      - Privilege Escalation: AD/Priv_Escalation.md
      - Domain Compromise: AD/Domain_Compromise.md
      - Persistance: AD/Persistance.md
      - Cross Forest & Trusts: AD/Cross_Forest_and_Trusts.md
      - Toolset: AD/Toolset.md
  - Web Security:
      - Initial Reconnaissance: Web/Initial_Reconnaissance.md
      - SQL Injection: Web/SQL_Injection.md
      - SSTI (Server Side Template Injection): Web/SSTI.md
      - Command Injection: Web/Command_Injection.md
      - XXE (XML External Entity Injection): Web/XXE.md
      - Cypher Injection: Web/Cypher_Injection.md
      - XSS (Cross-Site Scripting): Web/XSS.md
      - SSRF (Server-Side Request Forgery): Web/SSRF.md
      - CSRF (Cross-Site Request Forgery): Web/CSRF.md
      - File Inclusion: Web/File_Inclusion.md
      - File Upload: Web/File_Upload.md
      - IDOR (Insecure Direct Object Reference): Web/IDOR.md
      
  - Networking & Infrastructure:
      - Network Architecture: Networking/README.md
  - Modern Architecture:
      - Cloud: Cloud/README.md
      - Containers: Containers/README.md
      - Virtualization: Virtualization/README.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: false
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

extra:
  generator: false

extra_javascript:
  - javascripts/runaway-bat.js
  - javascripts/sidebar-follow-active.js
  - javascripts/page-up.js
  - javascripts/checklist-state.js
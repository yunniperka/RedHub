use_directory_urls: true
site_name: RedHub
site_url: https://yunniperka.github.io/RedHub/
site_author: yunni

theme:
  name: material

  font:
    text: Inter
    code: Fira Code

  palette:
    - scheme: slate
      primary: custom
      accent: custom

  features:
    - navigation.sections
    - toc.integrate
    - toc.follow
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/custom.css

nav:
  - Home: index.md
  - Windows:
      - Dupa: dupa.md
  - Linux:
      - Dupa: dupa.md
  - Enterprise Environments:
      - Active Directory: AD/README.md
  - Web Security:
      - Initial Reconnaissance: Web/Initial_Reconnaissance.md
      - SQL Injection: Web/SQL_Injection.md
      - XSS: Web/XSS.md
  - Networking & Infrastructure:
      - Network Architecture: Networking/README.md
  - Modern Architecture:
      - Cloud: Cloud/README.md
      - Containers: Containers/README.md
      - Virtualization: Virtualization/README.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: false
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

extra:
  generator: false

extra_javascript:
  - javascripts/runaway-bat.js
  - javascripts/sidebar-follow-active.js
  - javascripts/page-up.js